<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.8">
        <title>Contato</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- menu fixo no topo -->
        <br>
        <table class="centered">
            <tr>
                <td><a href="sobre.html" class="btn-interativo" role="button">Sobre mim</a></td>
                <td><a href="formacao.html" class="btn-interativo" role="button">Formação</a></td>
                <td><a href="portfolio.html" class="btn-interativo" role="button">Portfólio</a></td>
                <td><p class="btn-desativado" role="button">Contato</p></td>
            </tr>
        </table>
        
        <main>
            <form class="centered" action="" method="">
                <table class="centered">
                    <tr>
                        <th colspan="2">
                            <h3>Contato</h3>
                        </th>
                    </tr>

                    <tr>
                        <th><label>Nome: </label></th>
                        <td><input type="text" id="name_field"
                            style="width: 800px; padding: 5px;">
                        </td>
                    </tr>

                    <tr>
                        <th><label>E-mail: </label></th>
                        <td><input type="email" id="email_field"
                            style="width: 800px; padding: 5px;">
                        </td>
                    </tr>

                    <tr>
                        <th><label>Mensagem: </label></th>
                        <td><textarea id="message_field"
                            style="width: 800px; height: 300px; padding: 5px;">
                        </textarea></td>
                    </tr>
                </table>          
            </form>
        </main>
    </body>
</html>
